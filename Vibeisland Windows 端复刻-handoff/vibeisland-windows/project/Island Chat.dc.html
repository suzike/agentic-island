<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="display:flex;flex-direction:column;gap:10px;width:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;box-sizing:border-box">

  <sc-if value="{{ hasMessages }}" hint-placeholder-val="{{ false }}">
    <div class="ai-scroll" style="display:flex;flex-direction:column;gap:10px;max-height:230px;overflow-y:auto;padding-right:2px">
      <sc-for list="{{ messages }}" as="m" hint-placeholder-count="2">

        <sc-if value="{{ m.isUser }}" hint-placeholder-val="{{ false }}">
          <div style="align-self:flex-end;max-width:86%;display:flex;flex-direction:column;gap:5px;align-items:flex-end">
            <sc-if value="{{ m.hasAtt }}" hint-placeholder-val="{{ false }}">
              <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end">
                <sc-for list="{{ m.attachments }}" as="a" hint-placeholder-count="1">
                  <sc-if value="{{ a.isShot }}" hint-placeholder-val="{{ false }}">
                    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px 4px 4px;border-radius:9px;background:rgba(255,255,255,.08)">
                      <sc-if value="{{ a.hasThumb }}" hint-placeholder-val="{{ false }}"><img src="{{ a.thumb }}" style="width:34px;height:24px;border-radius:5px;object-fit:cover" /></sc-if>
                      <sc-if value="{{ a.noThumb }}" hint-placeholder-val="{{ true }}"><div style="width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg, oklch(0.6 0.12 200), oklch(0.5 0.14 280))"></div></sc-if>
                      <span style="color:oklch(0.85 0.02 150 / .85);font-size:10.5px">{{ a.name }}</span>
                    </div>
                  </sc-if>
                  <sc-if value="{{ a.isOther }}" hint-placeholder-val="{{ false }}">
                    <div style="display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:9px;background:rgba(255,255,255,.08)">
                      <span style="font-size:11px">{{ a.icon }}</span>
                      <span style="color:oklch(0.85 0.02 150 / .85);font-size:10.5px">{{ a.name }}</span>
                    </div>
                  </sc-if>
                </sc-for>
              </div>
            </sc-if>
            <sc-if value="{{ m.hasText }}" hint-placeholder-val="{{ true }}">
              <div style="padding:8px 12px;border-radius:14px 14px 4px 14px;background:linear-gradient(180deg, oklch(0.5 0.11 150), oklch(0.42 0.11 150));color:oklch(0.98 0.01 150);font-size:12px;line-height:1.5">{{ m.text }}</div>
            </sc-if>
          </div>
        </sc-if>

        <sc-if value="{{ m.isAgent }}" hint-placeholder-val="{{ true }}">
          <div style="align-self:flex-start;max-width:92%;display:flex;gap:8px">
            <div style="width:20px;height:20px;flex:none;border-radius:6px;background:linear-gradient(135deg, oklch(0.82 0.16 150), oklch(0.62 0.15 165));display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:2px">◆</div>
            <div style="display:flex;flex-direction:column;gap:7px;padding:11px 13px;border-radius:4px 14px 14px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)">
              <sc-if value="{{ m.isTyping }}" hint-placeholder-val="{{ false }}">
                <div style="display:flex;gap:4px;padding:2px 0">
                  <div style="width:6px;height:6px;border-radius:999px;background:oklch(0.7 0.08 150);animation:ai-dotpulse 1s ease-in-out infinite"></div>
                  <div style="width:6px;height:6px;border-radius:999px;background:oklch(0.7 0.08 150);animation:ai-dotpulse 1s ease-in-out .2s infinite"></div>
                  <div style="width:6px;height:6px;border-radius:999px;background:oklch(0.7 0.08 150);animation:ai-dotpulse 1s ease-in-out .4s infinite"></div>
                </div>
              </sc-if>
              <sc-for list="{{ m.blocks }}" as="b" hint-placeholder-count="0">
                <sc-if value="{{ b.isH }}" hint-placeholder-val="{{ false }}"><div style="color:oklch(0.94 0.02 150);font-size:12.5px;font-weight:700">{{ b.text }}</div></sc-if>
                <sc-if value="{{ b.isP }}" hint-placeholder-val="{{ false }}"><div style="color:oklch(0.84 0.02 150 / .9);font-size:12px;line-height:1.55">{{ b.text }}</div></sc-if>
                <sc-if value="{{ b.isUl }}" hint-placeholder-val="{{ false }}">
                  <div style="display:flex;flex-direction:column;gap:4px">
                    <sc-for list="{{ b.items }}" as="li" hint-placeholder-count="2">
                      <div style="display:flex;gap:7px;align-items:flex-start">
                        <div style="color:oklch(0.78 0.16 150);font-size:12px;line-height:1.5">•</div>
                        <div style="color:oklch(0.82 0.02 150 / .88);font-size:12px;line-height:1.5">{{ li.text }}</div>
                      </div>
                    </sc-for>
                  </div>
                </sc-if>
                <sc-if value="{{ b.isCode }}" hint-placeholder-val="{{ false }}">
                  <div style="color:oklch(0.86 0.1 150);font-size:11.5px;font-family:ui-monospace,'Cascadia Code',Consolas,monospace;background:rgba(0,0,0,.32);padding:8px 10px;border-radius:8px;overflow-x:auto;white-space:pre">{{ b.text }}</div>
                </sc-if>
                <sc-if value="{{ b.isNote }}" hint-placeholder-val="{{ false }}"><div style="color:oklch(0.7 0.02 150 / .7);font-size:11px;font-style:italic">{{ b.text }}</div></sc-if>
              </sc-for>
            </div>
          </div>
        </sc-if>

      </sc-for>
    </div>
  </sc-if>

  <!-- composer -->
  <div style="border-radius:16px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.08);padding:8px">
    <sc-if value="{{ hasAttachments }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px">
        <sc-for list="{{ attachments }}" as="a" hint-placeholder-count="1">
          <div style="display:flex;align-items:center;gap:6px;padding:4px 7px 4px 5px;border-radius:9px;background:rgba(255,255,255,.08)">
            <sc-if value="{{ a.isShot }}" hint-placeholder-val="{{ false }}"><div style="width:18px;height:18px;border-radius:4px;background:linear-gradient(135deg, oklch(0.6 0.12 200), oklch(0.5 0.14 280))"></div></sc-if>
            <sc-if value="{{ a.isOther }}" hint-placeholder-val="{{ true }}"><span style="font-size:11px">{{ a.icon }}</span></sc-if>
            <span style="color:oklch(0.85 0.02 150 / .85);font-size:10.5px">{{ a.name }}</span>
            <span style="color:oklch(0.7 0.02 150 / .6);font-size:11px;cursor:pointer" onClick="{{ a.remove }}">✕</span>
          </div>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ hasQuick }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px">
        <sc-for list="{{ quickReplies }}" as="q" hint-placeholder-count="3">
          <div style="padding:5px 11px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:oklch(0.84 0.04 150);font-size:11px;cursor:pointer" onClick="{{ q.go }}">{{ q.label }}</div>
        </sc-for>
      </div>
    </sc-if>
    <div style="display:flex;align-items:center;gap:6px">
      <input value="{{ composer.text }}" onChange="{{ onInput }}" onKeyDown="{{ onKey }}" placeholder="{{ placeholder }}" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:oklch(0.95 0.01 150);font-size:12.5px;font-family:'Segoe UI',system-ui,sans-serif;padding:5px 4px" />
      <div style="display:flex;align-items:center;gap:2px">
        <div title="图片" style="width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:oklch(0.8 0.02 150 / .8);font-size:14px" onClick="{{ imgClick }}" style-hover="background:rgba(255,255,255,.06)">🖼</div>
        <div title="文件" style="width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:oklch(0.8 0.02 150 / .8);font-size:14px" onClick="{{ fileClick }}" style-hover="background:rgba(255,255,255,.06)">📎</div>
        <div style="width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:{{ sendCursor }};background:{{ sendBg }};color:{{ sendColor }};font-size:14px;margin-left:2px" onClick="{{ doSend }}">↑</div>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:300}}">

class Component extends DCLogic {
  attIcon(t) { return t === 'voice' ? '🎤' : t === 'file' ? '📎' : '📷'; }

  pickImage = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
    inp.onchange = () => {
      Array.from(inp.files || []).forEach(f => {
        const url = URL.createObjectURL(f);
        if (this.props.onAttach) this.props.onAttach('screenshot', { thumb: url, name: f.name });
      });
    };
    inp.click();
  };

  pickFile = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.multiple = true;
    inp.onchange = () => {
      Array.from(inp.files || []).forEach(f => {
        if (f.type && f.type.startsWith('image/')) {
          const url = URL.createObjectURL(f);
          if (this.props.onAttach) this.props.onAttach('screenshot', { thumb: url, name: f.name });
        } else if (this.props.onAttach) this.props.onAttach('file', { name: f.name });
      });
    };
    inp.click();
  };

  renderVals() {
    const p = this.props;
    const composer = p.composer || { text: '', attachments: [], recording: false, recTime: '0:00' };

    const messages = (p.messages || []).map(m => {
      const atts = (m.attachments || []).map(a => ({ name: a.name, icon: this.attIcon(a.type), isShot: a.type === 'screenshot', isOther: a.type !== 'screenshot', thumb: a.thumb || '', hasThumb: !!a.thumb }));
      return {
        isUser: m.role === 'user',
        isAgent: m.role === 'agent',
        isTyping: !!m.typing,
        text: m.text || '',
        hasText: !!(m.text && m.text.length),
        hasAtt: atts.length > 0,
        attachments: atts,
        blocks: (m.blocks || []).map(b => ({
          isH: b.t === 'h', isP: b.t === 'p', isUl: b.t === 'ul', isCode: b.t === 'code', isNote: b.t === 'note',
          text: b.text || '',
          items: (b.items || []).map(x => ({ text: x })),
        })),
      };
    });

    const attachments = (composer.attachments || []).map((a, i) => ({
      name: a.name, icon: this.attIcon(a.type), isShot: a.type === 'screenshot', isOther: a.type !== 'screenshot',
      thumb: a.thumb || '', hasThumb: !!a.thumb, noThumb: !a.thumb && a.type === 'screenshot',
      remove: () => p.onRemoveAtt && p.onRemoveAtt(i),
    }));

    const canSend = !!(composer.text && composer.text.trim()) || attachments.length > 0;

    return {
      messages, hasMessages: messages.length > 0,
      composer: { text: composer.text || '' },
      attachments, hasAttachments: attachments.length > 0,
      placeholder: p.placeholder || '输入消息…',
      sendBg: canSend ? 'linear-gradient(180deg, oklch(0.82 0.16 150), oklch(0.7 0.16 150))' : 'rgba(255,255,255,.06)',
      sendColor: canSend ? 'oklch(0.14 0.02 150)' : 'oklch(0.6 0.02 150 / .5)',
      sendCursor: canSend ? 'pointer' : 'default',
      onInput: (e) => p.onText && p.onText(e.target.value),
      onKey: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (canSend && p.onSend) p.onSend(); } },
      doSend: () => { if (canSend && p.onSend) p.onSend(); },
      imgClick: this.pickImage,
      fileClick: this.pickFile,
      quickReplies: (p.quickReplies || []).map(q => ({ label: q, go: () => p.onQuick && p.onQuick(q) })),
      hasQuick: (p.quickReplies || []).length > 0,
    };
  }
}

</script>
</body>
</html>
