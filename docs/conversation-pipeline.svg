<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Agentic-Island v0.6.1 问答会话增强管线</title>
  <desc id="desc">从活动分支、上下文组装、多模型协作到知识库沉淀的完整数据流。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#d59a50"/></marker>
    <style>
      .t{font-family:'Segoe UI','Microsoft YaHei UI',sans-serif;fill:#f5f0ff}.h{font-size:25px;font-weight:700}.l{font-size:16px;font-weight:650}.s{font-size:13px}.m{fill:#aaa2bd}.b{rx:13;stroke-width:1.2}.p{fill:none;stroke:#d59a50;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="640" fill="#100d1a"/>
  <text class="t h" x="45" y="48">问答会话增强 · 分支、上下文、多模型与知识沉淀</text>
  <text class="t m s" x="45" y="73">消息展示与模型上下文分离；每个分支拥有独立记忆和指令，所有模型请求共用同一上下文组装器</text>

  <rect class="b" x="45" y="130" width="180" height="122" fill="#1e1836" stroke="#473b76"/>
  <text class="t l" x="68" y="166">输入与分支操作</text>
  <text class="t m s" x="68" y="194">提问 / 文本附件</text>
  <text class="t m s" x="68" y="216">任意节点 Fork</text>
  <text class="t m s" x="68" y="238">切换 / 命名 / 合并</text>

  <rect class="b" x="280" y="130" width="190" height="122" fill="#1f1a38" stroke="#c9884a"/>
  <text class="t l" x="303" y="166">活动分支状态</text>
  <text class="t m s" x="303" y="194">activeAskBranch</text>
  <text class="t m s" x="303" y="216">长期记忆 / 持续指令</text>
  <text class="t m s" x="303" y="238">父分支 / Fork 节点</text>

  <rect class="b" x="525" y="130" width="190" height="122" fill="#282414" stroke="#d9a441"/>
  <text class="t l" x="548" y="166">统一上下文组装</text>
  <text class="t m s" x="548" y="194">historyFromThread</text>
  <text class="t m s" x="548" y="216">钉选 / 排除 / 附件</text>
  <text class="t m s" x="548" y="238">条目 / token 预算</text>

  <rect class="b" x="770" y="130" width="190" height="122" fill="#201b2d" stroke="#806bb0"/>
  <text class="t l" x="793" y="166">模型执行层</text>
  <text class="t m s" x="793" y="194">OpenAI / Anthropic</text>
  <text class="t m s" x="793" y="216">本地 Agent / 多模型</text>
  <text class="t m s" x="793" y="238">快深模式 / 会诊辩论</text>

  <rect class="b" x="1015" y="130" width="140" height="122" fill="#302019" stroke="#a96549"/>
  <text class="t l" x="1038" y="166">回答结果</text>
  <text class="t m s" x="1038" y="194">主 blocks</text>
  <text class="t m s" x="1038" y="216">候选 variants</text>
  <text class="t m s" x="1038" y="238">下一问建议</text>

  <path class="p" d="M225 191H270"/><path class="p" d="M470 191H515"/><path class="p" d="M715 191H760"/><path class="p" d="M960 191H1005"/>

  <rect class="b" x="130" y="350" width="275" height="112" fill="#181430" stroke="#4e417e"/>
  <text class="t l" x="154" y="384">分支持久化</text>
  <text class="t m s" x="154" y="412">threads.ask：当前消息</text>
  <text class="t m s" x="154" y="434">askSessions：归档分支树</text>
  <text class="t m s" x="154" y="456">重要优先 · 临时状态清理</text>

  <rect class="b" x="462" y="350" width="275" height="112" fill="#181430" stroke="#4e417e"/>
  <text class="t l" x="486" y="384">回答内继续协作</text>
  <text class="t m s" x="486" y="412">followups：气泡内追问支线</text>
  <text class="t m s" x="486" y="434">analyses / variants：附着原回答</text>
  <text class="t m s" x="486" y="456">不污染主会话模型历史</text>

  <rect class="b" x="794" y="350" width="275" height="112" fill="#181430" stroke="#4e417e"/>
  <text class="t l" x="818" y="384">本地知识沉淀</text>
  <text class="t m s" x="818" y="412">完整分支 / 单条回答 / 框选片段</text>
  <text class="t m s" x="818" y="434">kbAddText → 分块 → embedding</text>
  <text class="t m s" x="818" y="456">conversation 来源立即参与 RAG</text>

  <path class="p" d="M375 252V340"/><path class="p" d="M1085 252V300H600V340"/><path class="p" d="M1085 252V340H932"/>

  <rect x="158" y="540" width="884" height="58" rx="13" fill="#201b2d" stroke="#806bb0"/>
  <text class="t l" x="185" y="574">一致性保证</text>
  <text class="t m s" x="315" y="574">稳定分支 ID 回写 · 供应商协议隔离 · 错误脱敏 · 重要上下文保留 · 旧会话兼容</text>
</svg>
