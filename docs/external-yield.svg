<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">外部应用让位流程</title><desc id="desc">打开网页、文件、本地 Markdown 和会议时，灵动岛如何避免覆盖外部窗口。</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#75dfbd"/></marker><style>.t{font-family:"Segoe UI","Microsoft YaHei",sans-serif;fill:#edf8f4}.m{fill:#91aaa2}.h{font-size:26px;font-weight:750}.l{font-size:15px;font-weight:700}.s{font-size:13px}.p{fill:none;stroke:#75dfbd;stroke-width:2.2;marker-end:url(#a)}.b{rx:13;stroke-width:1.4}</style></defs>
  <rect width="1200" height="470" fill="#071712"/><text class="t h" x="45" y="48">外部应用让位 · 置顶窗口不再遮挡工作目标</text><text class="t m s" x="45" y="72">所有 shell.openExternal、shell.openPath 和原生文件对话框统一经过 ExternalYieldController</text>
  <rect class="b" x="45" y="145" width="175" height="105" fill="#12352b" stroke="#44987b"/><text class="t l" x="68" y="180">用户触发外部操作</text><text class="t m s" x="68" y="207">网页 · 文件夹 · 文件</text><text class="t m s" x="68" y="229">会议 · Markdown</text>
  <rect class="b" x="265" y="145" width="175" height="105" fill="#132c36" stroke="#4d8ca7"/><text class="t l" x="288" y="180">收起完整面板</text><text class="t m s" x="288" y="207">renderer: collapse</text><text class="t m s" x="288" y="229">保留顶部入口</text>
  <rect class="b" x="485" y="145" width="175" height="105" fill="#282414" stroke="#a38c42"/><text class="t l" x="508" y="180">释放桌面焦点</text><text class="t m s" x="508" y="207">click-through · blur</text><text class="t m s" x="508" y="229">alwaysOnTop = false</text>
  <rect class="b" x="705" y="145" width="175" height="105" fill="#201b2d" stroke="#806bb0"/><text class="t l" x="728" y="180">打开外部目标</text><text class="t m s" x="728" y="207">系统浏览器 / Explorer</text><text class="t m s" x="728" y="229">原生文件选择器</text>
  <rect class="b" x="925" y="145" width="230" height="105" fill="#302019" stroke="#a96549"/><text class="t l" x="948" y="180">按场景恢复</text><text class="t m s" x="948" y="207">普通打开：1.4 秒后恢复顶部入口</text><text class="t m s" x="948" y="229">模态对话框：关闭后才恢复</text>
  <path class="p" d="M220 198H265"/><path class="p" d="M440 198H485"/><path class="p" d="M660 198H705"/><path class="p" d="M880 198H925"/>
  <rect x="265" y="315" width="615" height="75" rx="13" fill="#10231e" stroke="#315d50"/><text class="t l" x="290" y="345">一致性保证</text><text class="t m s" x="290" y="369">主进程统一包装外部入口；重复 hold 采用引用计数；dispose 清理计时器；完整面板不会自动重新展开</text>
</svg>
