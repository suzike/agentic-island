<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">项目工作台闭环</title><desc id="desc">资讯、待办、快捷执行、成果和复盘如何通过项目上下文联动。</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#75dfbd"/></marker><style>.t{font-family:"Segoe UI","Microsoft YaHei",sans-serif;fill:#edf8f4}.m{fill:#91aaa2}.h{font-size:26px;font-weight:750}.l{font-size:16px;font-weight:700}.s{font-size:13px}.p{fill:none;stroke:#75dfbd;stroke-width:2.2;marker-end:url(#a)}.b{rx:15;stroke-width:1.4}</style></defs>
  <rect width="1200" height="520" fill="#071712"/><text class="t h" x="45" y="48">项目工作台 · 从信息到执行再到知识</text><text class="t m s" x="45" y="72">资讯、待办与快捷执行共享稳定 projectId；原有独立能力保持不变</text>
  <rect class="b" x="62" y="180" width="180" height="122" fill="#12352b" stroke="#44987b"/><text class="t l" x="86" y="214">资讯情报</text><text class="t m s" x="86" y="242">RSS / 观察清单</text><text class="t m s" x="86" y="264">价值评分 / 信号跟踪</text><text class="t m s" x="86" y="286">AI 多源综合</text>
  <rect class="b" x="286" y="180" width="180" height="122" fill="#132c36" stroke="#4d8ca7"/><text class="t l" x="310" y="214">待办行动</text><text class="t m s" x="310" y="242">状态 / 优先级 / 依赖</text><text class="t m s" x="310" y="264">验收标准 / 工时</text><text class="t m s" x="310" y="286">AI 规划与拆解</text>
  <rect class="b" x="510" y="180" width="180" height="122" fill="#282414" stroke="#a38c42"/><text class="t l" x="534" y="214">快捷执行</text><text class="t m s" x="534" y="242">仓库上下文</text><text class="t m s" x="534" y="264">Shell / Agent / 岛动作</text><text class="t m s" x="534" y="286">安全确认与运行日志</text>
  <rect class="b" x="734" y="180" width="180" height="122" fill="#201b2d" stroke="#806bb0"/><text class="t l" x="758" y="214">项目成果</text><text class="t m s" x="758" y="242">情报简报 / 决策</text><text class="t m s" x="758" y="264">计划 / 报告</text><text class="t m s" x="758" y="286">执行记录</text>
  <rect class="b" x="958" y="180" width="180" height="122" fill="#302019" stroke="#a96549"/><text class="t l" x="982" y="214">复盘沉淀</text><text class="t m s" x="982" y="242">活动流水 / 周报</text><text class="t m s" x="982" y="264">效率洞察 / 番茄钟</text><text class="t m s" x="982" y="286">回写便签与知识库</text>
  <path class="p" d="M242 241H286"/><path class="p" d="M466 241H510"/><path class="p" d="M690 241H734"/><path class="p" d="M914 241H958"/>
  <path class="p" d="M1048 315V390H152V315"/>
  <rect x="386" y="100" width="428" height="48" rx="24" fill="#17372e" stroke="#4fa88a"/><text class="t l" x="480" y="130">统一项目上下文 · 目标 · 仓库 · 状态</text>
  <path class="p" d="M600 148V178"/>
  <rect x="268" y="430" width="664" height="48" rx="12" fill="#10231e" stroke="#315d50"/><text class="t m s" x="304" y="460">形成可追踪闭环：发现信号 → 明确行动 → 自动执行 → 留下证据 → 复盘优化</text>
</svg>
