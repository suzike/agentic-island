<rect class="box" x="339" y="454" width="332" height="90" fill="#201b2d" stroke="#806bb0"/><text class="t small" x="357" y="482">Encrypted local state</text><text class="t muted small" x="357" y="505">safeStorage / Windows DPAPI · 原子写入</text><text class="t muted small" x="357" y="526">KB 索引 · 录屏素材/工程 · 诊断日志</text>

