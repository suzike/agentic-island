<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Agentic-Island v0.6.1 总体架构</title>
  <desc id="desc">展示 Agent 接入、Electron 主进程、预加载桥、React 工作台和本地数据边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#f0a233"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity=".28"/></filter>
    <style>
      .t{font-family:"Segoe UI","Microsoft YaHei",sans-serif;fill:#f7f3ec}.muted{fill:#a9b0a4}.small{font-size:14px}.label{font-size:16px;font-weight:650}.head{font-size:27px;font-weight:750}.box{stroke-width:1.4;rx:12}.line{stroke:#f0a233;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="720" fill="#100d1a"/>
<text class="t head" x="48" y="52">Agentic-Island v0.6.1 · Windows 本地优先桌面架构</text>
  <text class="t muted small" x="48" y="78">Electron 39 · React 19 · TypeScript · loopback bridge · contextIsolation · DPAPI</text>

